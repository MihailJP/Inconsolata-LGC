#name: Build and check fonts
name: Build fonts

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ">=3.9"
    - name: Install Python dependencies
      run: |
        sudo pip3 install "fontforge-ref-sel-util>=0.1.3"
        python3 -m venv venv
        source venv/bin/activate
        pip3 install afdko fonttools fontmake
    - name: Install other dependencies
      run: |
        sudo apt remove firefox
        sudo apt update
        sudo apt upgrade
        sudo apt install fontforge ttfautohint
    - name: Build
      run: source venv/bin/activate; make
    - name: Make distributable
      run: make dist
    - name: Upload a Static TTF Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ttf
        path: InconsolataLGC/**
    - name: Upload a Hinted TTF Artifact
      uses: actions/upload-artifact@v7
      with:
        name: hinted
        path: InconsolataLGC-Hinted/**
    - name: Upload a Variable TTF Artifact
      uses: actions/upload-artifact@v7
      with:
        name: variable
        path: InconsolataLGC-Variable/**
  check:
    name: Check
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Get Fontspector configuration file
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          fontspector_static.toml
          fontspector_variable.toml
        sparse-checkout-cone-mode: false
    - name: Install fontspector
      uses: fonttools/setup-fontspector@main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Download the Artifact
      uses: actions/download-artifact@v8
    - name: Check Static Fonts
      run: |
        fontspector -l info --full-lists \
          --configuration fontspector_static.toml \
          ttf/*.ttf
    - name: Check Hinted Fonts
      run: |
        fontspector -l info --full-lists \
          --configuration fontspector_static.toml \
          hinted/*.ttf
    - name: Check Variable Fonts
      run: |
        fontspector -l info --full-lists \
          --configuration fontspector_variable.toml \
          variable/*.ttf
